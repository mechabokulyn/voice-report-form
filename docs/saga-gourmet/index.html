<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#9e3f1c">
  <meta name="description" content="佐賀県内のグルメ候補を、確認済み情報から検索・比較できる店舗ガイドです。">
  <meta property="og:title" content="佐賀グルメガイド">
  <meta property="og:description" content="佐賀の気になるお店を地域・ジャンルから探せます。">
  <title>佐賀グルメガイド</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">SAGA GOURMET GUIDE</p>
      <h1>佐賀グルメガイド</h1>
      <p class="lead">TikTokなどで見つけた佐賀県内のお店を調査し、住所・営業時間・おすすめ料理をまとめました。気になる店を検索して、次のお出かけ先を見つけてください。</p>
      <div class="stats" aria-label="掲載状況">
        <div class="stat"><strong id="totalStat">—</strong><span>掲載データ</span></div>
        <div class="stat"><strong id="verifiedStat">—</strong><span>確認済み</span></div>
        <div class="stat"><strong id="pendingStat">—</strong><span>要再調査</span></div>
      </div>
    </div>
  </header>

  <div class="toolbar-wrap">
    <div class="toolbar">
      <label class="search"><span class="sr-only"></span><input id="q" type="search" placeholder="店名・料理・住所で検索" autocomplete="off"></label>
      <select id="city" aria-label="地域で絞り込む"><option>すべて</option></select>
      <button id="favoriteToggle" class="ghost" type="button">☆ お気に入り</button>
    </div>
  </div>

  <main class="shell">
    <nav id="chips" class="chips" aria-label="ジャンル"></nav>
    <div class="results-head">
      <div><p class="eyebrow" style="color:#9e3f1c">RESTAURANTS</p><h2>お店を探す</h2></div>
      <p id="resultCount">読み込み中…</p>
    </div>
    <section id="list" class="grid" aria-live="polite"><div class="loading">店舗データを読み込んでいます…</div></section>
  </main>

  <dialog id="detailDialog"><div id="dialogBody" class="dialog-inner"></div></dialog>

  <footer class="footer">
    <strong>佐賀グルメガイド</strong><br>
    営業時間・定休日・価格などは変更される場合があります。訪問前に公式情報または店舗へご確認ください。
  </footer>
  <script src="app.js" defer></script>
</body>
</html>
