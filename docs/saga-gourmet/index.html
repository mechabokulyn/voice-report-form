<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#963c17"><meta property="og:title" content="佐賀グルメ候補マップ Ver.1.1"><meta property="og:description" content="TikTokで見つけた佐賀のグルメ候補69件"><title>佐賀グルメ候補マップ Ver.1.1</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#fff8ef;color:#2b211c}header{position:sticky;top:0;z-index:3;background:linear-gradient(135deg,#7a2d12,#d76a27);color:#fff;padding:16px 14px}h1{margin:0;font-size:22px}main{max-width:1000px;margin:auto;padding:12px}input{width:100%;padding:13px;border:1px solid #d8c5b8;border-radius:12px;font-size:16px}#chips{display:flex;gap:7px;overflow:auto;padding:10px 0}button{border:1px solid #d8c5b8;background:#fff;border-radius:999px;padding:8px 11px;white-space:nowrap}button.on{background:#963c17;color:#fff}#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}article{background:#fff;border:1px solid #ead9cc;border-radius:16px;padding:14px}h2{font-size:18px;margin:3px 0}.city{font-size:12px;color:#963c17;font-weight:bold}.tag{display:inline-block;background:#f9e7da;color:#843817;border-radius:99px;padding:4px 8px;font-size:12px}p{font-size:14px;line-height:1.5}.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}a{text-align:center;text-decoration:none;padding:10px;border-radius:10px;font-weight:bold;font-size:13px}.map{background:#963c17;color:#fff}.tab{background:#f4ece7;color:#5d2a14}footer{padding:24px;text-align:center;color:#75675f;font-size:12px}</style></head><body><header><h1>🍜 佐賀グルメ候補マップ <small style="font-size:12px">Ver.1.1</small></h1><div>TikTokで見つけた69店を検索・地図で確認</div></header><main><input id="q" placeholder="店名・地域・料理で検索"><div id="chips"></div><p id="count"></p><div id="list"></div></main><footer>営業時間・定休日・価格・閉店移転は変更される場合があります。訪問前に公式情報をご確認ください。</footer><script src="data.js"></script><script>let cat='すべて';const cats=['すべて',...new Set(S.map(x=>x[2]))],chips=document.getElementById('chips'),list=document.getElementById('list'),q=document.getElementById('q'),count=document.getElementById('count');function esc(x){return x.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function renderChips(){chips.innerHTML='';cats.forEach(x=>{const b=document.createElement('button');b.textContent=x;b.className=x===cat?'on':'';b.onclick=()=>{cat=x;renderChips();render()};chips.appendChild(b)})}function render(){const t=q.value.toLowerCase(),a=S.filter(x=>(cat==='すべて'||x[2]===cat)&&x.join(' ').toLowerCase().includes(t));count.textContent=`${a.length}件表示／全${S.length}件`;list.innerHTML=a.map(x=>{const query=encodeURIComponent(x[0]+' '+x[1]);const map='https://www.google.com/maps/search/?api=1&query='+query;const tab='https://www.google.com/search?q='+encodeURIComponent('site:tabelog.com '+x[0]+' '+x[1]);return `<article><div class="city">${esc(x[1])}</div><h2>${esc(x[0])}</h2><span class="tag">${esc(x[2])}</span><p>${esc(x[3])}</p><div class="btns"><a class="map" href="${map}" target="_blank">Googleマップ</a><a class="tab" href="${tab}" target="_blank">食べログ検索</a></div></article>`}).join('')}q.oninput=render;renderChips();render();</script></body></html>
